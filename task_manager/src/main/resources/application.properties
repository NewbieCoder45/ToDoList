spring.application.name=task_manager
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PSWRD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ddl-auto means that whenever the application starts, if the value is set to:
# create: drop the old database and create everything anew
# update: keep the old database and alter the new values/ entries
spring.jpa.hibernate.ddl-auto=validate

# To see all the sql queries being done by the ddl-auto jpa, we keep the value true
spring.jpa.show-sql=true

# Flyway config:
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
